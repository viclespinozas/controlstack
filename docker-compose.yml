services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: control_backend
    restart: unless-stopped
    env_file: .env
    environment:
      MONGO_URI: mongodb://mongo:27017
      DATABASE_NAME: controlstack
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    depends_on:
      - mongo
    command: ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]

  mongo:
    image: mongo:7
    container_name: controlstack_mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data:
